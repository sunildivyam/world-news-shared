name: Increment package version on develop PR
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      # - reopened
      # - synchronize

permissions:
  contents: write

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Enable Corepack and install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: |
          pnpm version patch -m "chore(release): %s [skip ci]"

      - name: Push bumped version back to PR branch
        run: |
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
